<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newroz 2026 | Private Celebration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0c0b;
            --surface-color: #161a18;
            --primary-gold: #c5a059;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --accent-green: #1e3a2b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(10, 12, 11, 0.85), rgba(10, 12, 11, 0.85)), 
                        radial-gradient(circle at center, var(--accent-green) 0%, var(--bg-color) 75%);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            color: var(--primary-gold);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .hero-date {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        section {
            padding: 60px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            header { height: 50vh; }
        }

        .card {
            background: var(--surface-color);
            padding: 40px;
            border-radius: 4px;
            border: 1px solid rgba(197, 160, 89, 0.1);
        }
